<!DOCTYPE html>
<html>
<head>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        .task-list {
            width: 80%;
            min-height: 200px;
            margin: 10px;
            padding: 10px;
            border: 1px solid black;
        }
        .task-item {
            position: relative;
            padding-right: 60px; /* Padding to make room for the delete button */
            margin-bottom: 10px; /* Margin for space between tasks */
        }
        .delete-button {
            position: absolute;
            right: 0;
            top: 0;
            border: none;
            background: red;
            color: white;
            cursor: pointer;
        }
        .edit-textarea {
            width: 100%;  /* 親要素の幅に合わせる */
            height: 200px; /* 高さを50pxに設定 */
        }
    </style>
</head>
<body>
    <div id="completed" class="task-list" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>■完了</h2>
    </div>
    
    <div id="in-progress" class="task-list" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>■作業</h2>
    </div>
    
    <div id="tomorrow" class="task-list" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>■明日以降</h2>
    </div>
    
    <div id="other" class="task-list" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>■その他</h2>
    </div>
    
    <h2>タスクの追加</h2>
    <textarea id="new-task-input" rows="4" cols="50" placeholder="Write your new task here."></textarea>
    <button id="add-task-button">Add Task</button>
    <button id="download-tasks-button">Download Tasks</button>
    <script src="task.js"></script>
</body>
</html>
